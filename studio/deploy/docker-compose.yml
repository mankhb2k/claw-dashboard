# Claw Dashboard OSS — full stack: postgres + api + web + gateway (4 services)
#
# Pull pre-built images (recommended — no --build):
#   cp deploy/.env.example deploy/.env
#   docker compose -f deploy/docker-compose.yml pull
#   docker compose -f deploy/docker-compose.yml up -d
#
# Build api/web from source (dev):
#   docker compose -f deploy/docker-compose.yml up -d --build api web
#
# Gateway: official image alpine/openclaw (not studio/gateway)
#
# Images: https://hub.docker.com/u/claw-dashboard
#
# URLs:
#   Web:     http://localhost:8386
#   API:     http://localhost:8387
#   Gateway: http://localhost:18789

services:
  postgres:
    image: postgres:16-alpine
    container_name: claw-dashboard-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-openclaw}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-openclaw}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  gateway:
    image: ${OPENCLAW_IMAGE:-alpine/openclaw:latest}
    pull_policy: always
    container_name: claw-dashboard-gateway
    entrypoint:
      [
        "sh",
        "-c",
        "sed 's/\\r$//' /entrypoint/gateway-entrypoint.sh > /tmp/gateway-entrypoint.sh && exec sh /tmp/gateway-entrypoint.sh",
      ]
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-dev-gateway-token-change-me}
      OPENCLAW_DATA_ROOT: /data/projects
    volumes:
      - openclaw_data:/data/projects
      - ./scripts/gateway-entrypoint.sh:/entrypoint/gateway-entrypoint.sh:ro
    ports:
      - "127.0.0.1:18789:18789"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 8
    restart: unless-stopped

  api:
    image: ${CLAW_DASHBOARD_API_IMAGE:-docker.io/claw-dashboard/api:${CLAW_DASHBOARD_IMAGE_TAG:-latest}}
    pull_policy: always
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: claw-dashboard-api
    environment:
      NODE_ENV: production
      PORT: 8387
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-openclaw}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-long-random-string}
      JWT_ACCESS_SECONDS: ${JWT_ACCESS_SECONDS:-900}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-7}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8386}
      BACKEND_URL: http://localhost:8387
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      OPENCLAW_GATEWAY_URL: http://gateway:18789
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-dev-gateway-token-change-me}
      OPENCLAW_DATA_ROOT: /data/projects
      OPENCLAW_RUNTIME_UID: ${OPENCLAW_RUNTIME_UID:-1000}
      OPENCLAW_RUNTIME_GID: ${OPENCLAW_RUNTIME_GID:-1000}
      OPENCLAW_GATEWAY_MIN_PROTOCOL: ${OPENCLAW_GATEWAY_MIN_PROTOCOL:-4}
      OPENCLAW_GATEWAY_MAX_PROTOCOL: ${OPENCLAW_GATEWAY_MAX_PROTOCOL:-4}
      SELF_HOST_USER_USERNAME: ${SELF_HOST_USER_USERNAME:-${SELF_HOST_USER_LOGIN:-admin}}
      SELF_HOST_USER_PASSWORD: ${SELF_HOST_USER_PASSWORD:-admin123}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8387/api/connectors/oauth/callback}
      OAUTH_MODE: ${OAUTH_MODE:-}
      OAUTH_RELAY_URL: ${OAUTH_RELAY_URL:-}
      OAUTH_RELAY_API_SECRET: ${OAUTH_RELAY_API_SECRET:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - openclaw_data:/data/projects
    ports:
      - "127.0.0.1:8387:8387"
    depends_on:
      postgres:
        condition: service_healthy
      gateway:
        condition: service_started
    restart: unless-stopped

  web:
    image: ${CLAW_DASHBOARD_WEB_IMAGE:-docker.io/claw-dashboard/web:${CLAW_DASHBOARD_IMAGE_TAG:-latest}}
    pull_policy: always
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8387}
        NEXT_PUBLIC_MOCK_API: ${NEXT_PUBLIC_MOCK_API:-false}
    container_name: claw-dashboard-web
    environment:
      NODE_ENV: production
      PORT: 8386
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8387}
    ports:
      - "127.0.0.1:8386:8386"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
    name: claw-dashboard-postgres-data
  openclaw_data:
    name: claw-dashboard-openclaw-data
