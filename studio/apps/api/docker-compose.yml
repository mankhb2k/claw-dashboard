# Chạy full stack trong Docker (backend image + Postgres). Dev thường dùng docker-compose.deps.yml + npm run dev.
services:
  backend:
    build: .
    image: clawsaas-be:dev
    container_name: clawsaas-api
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/openclaw
      NODE_ENV: production
      PORT: 8387
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      OPENCLAW_IMAGE: ${OPENCLAW_IMAGE:-mankhb2k/clawsaas-worker:1.0.0}
    ports:
      - '8387:8387'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: clawsaas-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: openclaw
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d openclaw']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
    name: clawsaas-postgres-data
