# Dev local: chỉ Postgres. Backend chạy `npm run dev` trên host.
# Chạy: npm run docker:deps   hoặc   docker compose -f docker-compose.deps.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: clawsaas-postgres-deps
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: openclaw
    ports:
      - '5432:5432'
    volumes:
      - clawsaas_postgres_deps:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d openclaw']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  clawsaas_postgres_deps:
    name: clawsaas-postgres-data-deps
