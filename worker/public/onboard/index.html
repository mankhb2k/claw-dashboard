<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw — Thiết lập lần đầu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="onboard-shell">
    <div class="onboard-card">
      <h1>🦞 Chào mừng OpenClaw</h1>
      <p class="onboard-lead">
        Thiết lập lần đầu: Chọn AI model (Ollama cục bộ hoặc API) và bắt đầu.
      </p>

      <fieldset class="field">
        <legend>Cách thiết lập</legend>
        <div class="radio-stack">
          <label class="radio-row">
            <input
              type="radio"
              name="setupKind"
              value="api"
              id="setupApi"
              checked
            />
            <span class="radio-body">
              <span class="radio-title">API nhà cung cấp</span>
              <span class="radio-desc"
                >Anthropic, Google Gemini, OpenAI — cần API key</span
              >
            </span>
          </label>
          <label class="radio-row">
            <input type="radio" name="setupKind" value="ollama" id="setupOllama" />
            <span class="radio-body">
              <span class="radio-title">DeepSeek-R1 (Ollama — cục bộ)</span>
              <span class="radio-desc">Chạy trên máy, không cần API key</span>
            </span>
          </label>
        </div>
      </fieldset>

      <div id="sectionApi">
        <div class="field">
          <label class="field-label" for="provider">Nhà cung cấp AI</label>
          <select id="provider">
            <option value="anthropic">Anthropic (Claude) — API key</option>
            <option value="gemini">Google Gemini — API key</option>
            <option value="openai">OpenAI — API key</option>
          </select>
          <span class="field-hint"
            >API key chỉ dùng trên máy của bạn để chạy thiết lập</span
          >
        </div>

        <div class="field">
          <label class="field-label" for="apiKey">API Key</label>
          <input
            type="password"
            id="apiKey"
            autocomplete="off"
            placeholder="Dán API key của bạn"
          />
        </div>
      </div>

      <div id="sectionOllama" class="section-hidden">
        <fieldset class="field">
          <legend>Model DeepSeek-R1</legend>
          <div class="radio-stack">
            <label class="radio-row">
              <input
                type="radio"
                name="ollamaModel"
                value="deepseek-r1:1.5b"
                id="model15"
              />
              <span class="radio-body">
                <span class="radio-title">1.5B — nhẹ</span>
                <span class="radio-desc">Phù hợp máy yếu</span>
              </span>
            </label>
            <label class="radio-row">
              <input
                type="radio"
                name="ollamaModel"
                value="deepseek-r1:8b"
                id="model8"
                checked
              />
              <span class="radio-body">
                <span class="radio-title">8B — cân bằng</span>
                <span class="radio-desc">Đề xuất (Q4)</span>
              </span>
            </label>
            <label class="radio-row">
              <input
                type="radio"
                name="ollamaModel"
                value="deepseek-r1:14b"
                id="model14"
              />
              <span class="radio-body">
                <span class="radio-title">14B — chất lượng cao</span>
                <span class="radio-desc">Cần VRAM 6GB+</span>
              </span>
            </label>
          </div>
        </fieldset>

        <div class="callout callout--info">
          Cài và mở <strong>Ollama</strong> trước khi chạy thiết lập. Tải tại
          <a href="https://ollama.com" target="_blank">ollama.com</a>
        </div>
      </div>

      <div class="row-check">
        <input type="checkbox" id="acceptRisk" />
        <label for="acceptRisk">
          Tôi hiểu rủi ro và đồng ý chạy thiết lập tự động
        </label>
      </div>

      <div class="actions">
        <button type="button" class="btn" id="btnSkip">Bỏ qua</button>
        <button type="button" class="btn primary" id="btnRun">
          Chạy thiết lập
        </button>
      </div>

      <div class="progress-bar" id="progressBar">
        <div class="progress-bar-fill"></div>
      </div>

      <div class="error" id="errorBox" role="alert"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
