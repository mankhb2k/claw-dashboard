version: '3.8'

services:
  traefik:
    image: traefik:v3
    container_name: openclaw-traefik
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=openclaw-net
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.cf.acme.dnschallenge=true
      - --certificatesresolvers.cf.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cf.acme.dnschallenge.resolvers=1.1.1.1:53
      - --certificatesresolvers.cf.acme.email=${CF_EMAIL:-admin@openclaw.ai}
      - --certificatesresolvers.cf.acme.storage=/certs/acme.json
      - --api=false
    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/certs
    networks:
      - openclaw-net
    restart: unless-stopped

  vps-worker:
    image: mankhb2k/clawsaas-vps-worker:${VPS_WORKER_TAG:-latest}
    container_name: openclaw-vps-worker
    ports:
      - '3002:3002'
    environment:
      REDIS_URL: ${REDIS_URL:-redis://default:password@redis-host:6379}
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL:-http://localhost:3001}
      VPS_WORKER_SECRET: ${VPS_WORKER_SECRET:-dev-secret}
      VPS_NODE_ID: ${VPS_NODE_ID:-vps-1}
      OPENCLAW_IMAGE: ${OPENCLAW_IMAGE:-openclaw-gateway:latest}
      DATA_DIR: /data/users
      PORT: '3002'
      NODE_ENV: ${NODE_ENV:-production}
      DEBUG: ${DEBUG:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /data/users:/data/users
    networks:
      - openclaw-net
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3002/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  traefik-certs:

networks:
  openclaw-net:
    driver: bridge
