# CI cho apps/api — lint (0 error) + build trên PR/push.
# Tài liệu: apps/api/.agent/rule.md §7.12 · apps/api/.agent/note.md §1.
name: API CI

on:
  push:
    branches: [main, master]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/api-ci.yml"

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-quality:
    name: Lint + Build (apps/api)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Hard rules (error) block merge — rule.md §7. Warnings allowed (note.md §1).
      - name: Lint (eslint)
        run: pnpm --filter @aucobot/api lint:ci

      - name: Build (nest build)
        run: pnpm --filter @aucobot/api build

      # test: chưa gate — xem note.md §3.2
