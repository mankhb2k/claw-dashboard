version: '3.8'

services:
  vps-heavy:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_PLAYWRIGHT: '1'
    container_name: openclaw-vps-heavy
    ports:
      - '3003:3003'
    environment:
      REDIS_URL: ${REDIS_URL:-redis://default:changeme@redis:6379}
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL:-http://localhost:3001}
      VPS_WORKER_SECRET: ${VPS_WORKER_SECRET:-dev-secret}
      DATA_DIR: /data/users
      CONCURRENT_JOBS: ${CONCURRENT_JOBS:-3}
      MAX_OUTPUT_SIZE: ${MAX_OUTPUT_SIZE:-500000000}
      FFMPEG_TIMEOUT: ${FFMPEG_TIMEOUT:-300}
      PLAYWRIGHT_TIMEOUT: ${PLAYWRIGHT_TIMEOUT:-120}
      PORT: '3003'
      NODE_ENV: ${NODE_ENV:-production}
      DEBUG: ${DEBUG:-false}

      # Optional API Keys
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_TTS_API_KEY: ${GOOGLE_TTS_API_KEY:-}
      GOOGLE_STT_API_KEY: ${GOOGLE_STT_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}

    volumes:
      - /data/users:/data/users
      - /var/log/openclaw-heavy:/var/log/openclaw-heavy

    networks:
      - openclaw-net

    restart: unless-stopped

    depends_on:
      - redis

    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3003/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: openclaw-redis-heavy
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - openclaw-net
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis-data:

networks:
  openclaw-net:
    driver: bridge
